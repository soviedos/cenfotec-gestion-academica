name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────
# Backend: ruff lint + pytest (Docker + PostgreSQL)
# ──────────────────────────────────────────────
jobs:
  backend:
    name: Backend · lint + test
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Lint (ruff)
        run: >
          docker run --rm
          -v "$PWD/backend:/app" -w /app
          ghcr.io/astral-sh/ruff:latest check .

      - name: Test (Docker + PostgreSQL)
        run: |
          docker compose -f infra/docker/docker-compose.ci.yml -p ci-test \
            up --build --abort-on-container-exit --exit-code-from backend

      - name: Cleanup
        if: always()
        run: |
          docker compose -f infra/docker/docker-compose.ci.yml -p ci-test \
            down -v --remove-orphans

  # ──────────────────────────────────────────────
  # Frontend: eslint + type-check + test + build
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend · lint + test + build
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ci-frontend --target development frontend/

      - name: Lint + type-check + test + build
        run: >
          docker run --rm ci-frontend
          sh -c "npm run lint && npx tsc --noEmit && npm test && npm run build"

  # ──────────────────────────────────────────────
  # Repo: validate structure + compose syntax
  # ──────────────────────────────────────────────
  repo:
    name: Repo · validate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Required files exist
        run: |
          for f in \
            README.md LICENSE Makefile .env.example \
            backend/pyproject.toml backend/Dockerfile \
            frontend/package.json frontend/Dockerfile \
            infra/docker/docker-compose.yml; do
            test -f "$f" || { echo "Missing: $f"; exit 1; }
          done
          echo "✓ All required files present"

      - name: Docker Compose syntax
        run: docker compose -f infra/docker/docker-compose.yml config --quiet

      - name: No secrets in repo
        run: |
          if grep -rn --include='*.py' --include='*.ts' --include='*.tsx' --include='*.env' \
            -E '(AKIA[0-9A-Z]{16}|sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36})' .; then
            echo "::error::Potential secrets detected"
            exit 1
          fi
          echo "✓ No secrets found"
