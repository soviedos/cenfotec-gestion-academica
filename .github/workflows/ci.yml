name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────
# Backend: Python 3.12 — ruff lint + pytest
# ──────────────────────────────────────────────
jobs:
  backend:
    name: Backend · lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v --tb=short
        env:
          ENVIRONMENT: testing

  # ──────────────────────────────────────────────
  # Frontend: Node 22 — eslint + type-check + test + build
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend · lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────
  # Repo: validate structure + compose syntax
  # ──────────────────────────────────────────────
  repo:
    name: Repo · validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required files exist
        run: |
          for f in \
            README.md LICENSE Makefile .env.example \
            backend/pyproject.toml backend/Dockerfile \
            frontend/package.json frontend/Dockerfile \
            infra/docker/docker-compose.yml; do
            test -f "$f" || { echo "Missing: $f"; exit 1; }
          done
          echo "✓ All required files present"

      - name: Docker Compose syntax
        run: docker compose -f infra/docker/docker-compose.yml config --quiet

      - name: No secrets in repo
        run: |
          if grep -rn --include='*.py' --include='*.ts' --include='*.tsx' --include='*.env' \
            -E '(AKIA[0-9A-Z]{16}|sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36})' .; then
            echo "::error::Potential secrets detected"
            exit 1
          fi
          echo "✓ No secrets found"
